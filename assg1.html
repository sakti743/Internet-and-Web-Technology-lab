<html>
<head>
    <style>
        body { margin: 0; }
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            height: 100vh;
            width: 100vw;
        }
        .box {
            border: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
            cursor: pointer;
            transition: background-color 0.3s;
        }
    </style>
</head>
<body>
    <div class="grid-container">
        <div id="q1" class="box" onclick="changeColor('q1')">Part 1</div>
        <div id="q2" class="box" onclick="changeColor('q2')">Part 2</div>
        <div id="q3" class="box" onclick="changeColor('q3')">Part 3</div>
        <div id="q4" class="box" onclick="changeColor('q4')">Part 4</div>
    </div>
    <script>
        const neighbors = {
            "q1": ["q2", "q3"], 
            "q2": ["q1", "q4"], 
            "q3": ["q1", "q4"], 
            "q4": ["q2", "q3"]  
        };

        function changeColor(clickedId) {
            const allBoxes = document.querySelectorAll('.box');
            allBoxes.forEach(box => box.style.backgroundColor = "green");
            document.getElementById(clickedId).style.backgroundColor = "red";
            const nearPlaces = neighbors[clickedId];
            nearPlaces.forEach(id => {
                document.getElementById(id).style.backgroundColor = "blue";
            });
        }
    </script>
</body>
</html>
