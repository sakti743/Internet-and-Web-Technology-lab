<head>
<script>
var a=parseInt(prompt("enter a number to check pallindrome"));
var n=a;
var sum=0;
while(a!=0)
{
	let rem=a%10;
	sum=sum*10+rem;
	a=a/10;
	
}
if(a==n)
document.write("pallindrome");
else
document.write("not a pallindrome");
</script>
