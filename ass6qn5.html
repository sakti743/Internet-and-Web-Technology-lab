<!DOCTYPE html>
<html>
<body>
    <h3>Prime Checker</h3>
    <input type="number" id="numField" placeholder="Enter a number">
    <button onclick="checkPrime()">Check</button>
    <script>
        function checkPrime() 
        {
            const n = parseInt(document.getElementById("numField").value);
            let isPrime = true;
            if (n <= 1) 
            {
                isPrime = false;
            } else 
            {
                for (let i = 2; i <= Math.sqrt(n); i++) 
                {
                    if (n % i === 0) 
                    {
                        isPrime = false;
                        break;
                    }
                }
            }
            if (isPrime) 
            {
                alert(n + " is a prime number!");
            } else 
            {
                alert(n + " is NOT a prime number.");
            }
        }
    </script>
</body>
</html>
