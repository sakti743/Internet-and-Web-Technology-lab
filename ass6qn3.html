<!DOCTYPE html>
<html>
<head>
    <style>
        #colorBox {
            width: 200px;
            height: 100px;
            border: 2px solid #000;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <button onclick="updateBg('red')">Red</button>
    <button onclick="updateBg('green')">Green</button>
    <button onclick="updateBg('blue')">Blue</button>

    <div id="colorBox">Color Display Area</div>

    <script>
        function updateBg(color) {
            const userConfirmed = confirm("Do you really want to change the background color to " + color + "?");
            
            if (userConfirmed) {
                document.getElementById("colorBox").style.backgroundColor = color;
            }
        }
    </script>
</body>
</html>
