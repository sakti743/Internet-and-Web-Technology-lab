<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Question 08 - Prime Number Check</title>
</head>
<body>
    <h1>Prime Number Checker</h1>
    <script language="JavaScript">
        let numberToCheck = 17;
        function isPrime(num) {
            if (num <= 1) return false; 
            for (let i = 2; i <= Math.sqrt(num); i++) {
                if (num % i === 0) {
                    return false; 
                }
            }
            return true; 
        }
        let result = isPrime(numberToCheck);
        document.write("<p>The number <b>" + numberToCheck + "</b> is prime: <b>" + result + "</b></p>");
    </script>
</body>
</html>
