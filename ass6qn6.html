<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Currency Converter</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .converter-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 350px;
        }
        h2 { margin-bottom: 20px; font-size: 24px; color: #333; }
        .group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; color: #666; font-size: 14px; }
        
        select, input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
            outline: none;
        }
        input:read-only { background-color: #fafafa; color: #333; }

        .btn-convert {
            width: 100%;
            padding: 14px;
            background-color: #000;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-convert:hover { background-color: #222; }

        #errorMessage {
            color: #d9534f;
            font-size: 13px;
            margin-top: 10px;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="converter-card">
    <h2>Currency Converter</h2>
    
    <div class="group">
        <label>From:</label>
        <select id="fromCurrency">
            <option value="USD">USD</option>
            <option value="EUR">EUR</option>
            <option value="GBP">GBP</option>
            <option value="INR">INR</option>
            <option value="AUD">AUD</option>
        </select>
    </div>

    <div class="group">
        <input type="number" id="inputAmount" placeholder="Enter amount">
    </div>

    <div class="group">
        <label>To:</label>
        <select id="toCurrency">
            <option value="USD">USD</option>
            <option value="EUR">EUR</option>
            <option value="GBP">GBP</option>
            <option value="INR" selected>INR</option>
            <option value="AUD">AUD</option>
        </select>
    </div>

    <div class="group">
        <input type="text" id="outputAmount" placeholder="Converted amount" readonly>
    </div>

    <button class="btn-convert" onclick="performConversion()">Convert</button>
    <div id="errorMessage"></div>
</div>

<script>
    const conversionRates = {
        USD: { EUR: 0.93, GBP: 0.82, INR: 82.74, AUD: 1.47 },
        EUR: { USD: 1.08, GBP: 0.88, INR: 89.06, AUD: 1.58 },
        GBP: { USD: 1.22, EUR: 1.14, INR: 101.5, AUD: 1.80 },
        INR: { USD: 0.012, EUR: 0.011, GBP: 0.0098, AUD: 0.018 },
        AUD: { USD: 0.68, EUR: 0.63, GBP: 0.55, INR: 55.87 }
    };

    function performConversion() {
        const from = document.getElementById('fromCurrency').value;
        const to = document.getElementById('toCurrency').value;
        const amount = document.getElementById('inputAmount').value;
        const outputField = document.getElementById('outputAmount');
        const errorDiv = document.getElementById('errorMessage');

        // Reset display
        errorDiv.style.display = "none";
        outputField.value = "";

        // 1. Check if fields are empty
        if (amount === "") {
            showError("Please enter an amount.");
            return;
        }

        // 2. Check if From and To currencies are the same
        if (from === to) {
            showError("Source and target currencies cannot be the same.");
            return;
        }

        // Calculation using the conversionRates object
        const rate = conversionRates[from][to];
        const result = (parseFloat(amount) * rate).toFixed(2);
        
        // Display result
        outputField.value = result;
    }

    function showError(msg) {
        const errorDiv = document.getElementById('errorMessage');
        errorDiv.textContent = msg;
        errorDiv.style.display = "block";
    }
</script>

</body>
</html>
